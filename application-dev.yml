spring:
  application:
    name: spring-manifold-nextgen

  datasource:
    url: jdbc:h2:mem:manifold;DB_CLOSE_DELAY=-1
    username: sa
    password: ""
    driver-class-name: org.h2.Driver

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  data:
    redis:
      host: 127.0.0.1
      port: 6379
      password: redis_password

  ai:
    ollama:
      base-url: http://127.0.0.1:11434
      embedding:
        options:
          model: mxbai-embed-large
    vectorstore:
      pgvector:
        url: jdbc:postgresql://127.0.0.1:5432/manifold
        username: manifold
        password: manifold_password
        driver-class-name: org.postgresql.Driver
        initialize-schema: true

  batch:
    jdbc:
      initialize-schema: always

  threads:
    virtual:
      enabled: true

server:
  port: 8080
